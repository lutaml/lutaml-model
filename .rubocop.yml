inherit_from:
  - https://raw.githubusercontent.com/riboseinc/oss-guides/main/ci/rubocop.yml
  - .rubocop_todo.yml

plugins:
- rubocop-performance
- rubocop-rake
- rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - '**/*.adoc'
    - '**/*.md'
    - 'niso-jats/**/*'
    - 'sts-ruby/**/*'

Style/OneClassPerFile:
  inherit_mode:
    merge:
      - Exclude
  Exclude:
    - 'spec/**/*'
